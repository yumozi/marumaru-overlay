<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 280px;
      padding: 16px;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #1a1a22;
      color: #e4e4e8;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    h1 .icon { font-size: 18px; }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }

    .row + .row {
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .row-label {
      font-size: 13px;
      color: #b0b0b8;
      flex-shrink: 0;
    }

    /* Toggle switch */
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      border-radius: 22px;
      background: #333;
      cursor: pointer;
      transition: background 0.25s;
    }

    .slider::before {
      content: "";
      position: absolute;
      left: 3px;
      top: 3px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      transition: transform 0.25s;
    }

    .switch input:checked + .slider {
      background: #6c5ce7;
    }

    .switch input:checked + .slider::before {
      transform: translateX(18px);
    }

    /* Size control */
    .size-control {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .size-control button, .pos-btn {
      width: 24px;
      height: 24px;
      margin: 0;
      padding: 0;
      font-size: 15px;
      font-weight: 600;
      line-height: 24px;
      text-align: center;
      color: #c8c8d0;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .size-control button:hover, .pos-btn:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .size-control button:active, .pos-btn:active {
      background: rgba(255, 255, 255, 0.2);
    }

    .size-value {
      font-size: 12px;
      color: #e4e4e8;
      min-width: 28px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    /* Color picker */
    .color-pick {
      width: 28px;
      height: 28px;
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      padding: 0;
      cursor: pointer;
      background: none;
      flex-shrink: 0;
    }

    .color-pick::-webkit-color-swatch-wrapper { padding: 0; }
    .color-pick::-webkit-color-swatch {
      border: none;
      border-radius: 4px;
    }

    /* Position D-pad */
    .pos-grid {
      display: grid;
      grid-template-columns: 24px 24px 24px;
      grid-template-rows: 24px 24px 24px;
      gap: 3px;
      flex-shrink: 0;
    }

    .pos-grid .center-dot {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.15);
      font-size: 10px;
    }

    /* Action buttons */
    .actions {
      margin-top: 12px;
    }

    .actions button {
      width: 100%;
      padding: 8px;
      font-size: 12px;
      font-weight: 500;
      color: #c8c8d0;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .actions button:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .status {
      margin-top: 12px;
      font-size: 11px;
      text-align: center;
      color: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <h1><span class="icon">♪</span> Marumaru Overlay</h1>

  <div class="row">
    <span class="row-label">Show overlay</span>
    <label class="switch">
      <input type="checkbox" id="toggle" checked />
      <span class="slider"></span>
    </label>
  </div>

  <div class="row">
    <span class="row-label">Lyrics size</span>
    <div class="size-control">
      <button id="lyric-down">&minus;</button>
      <span class="size-value" id="lyric-value">22</span>
      <button id="lyric-up">+</button>
    </div>
  </div>

  <div class="row">
    <span class="row-label">Translation size</span>
    <div class="size-control">
      <button id="trans-down">&minus;</button>
      <span class="size-value" id="trans-value">15</span>
      <button id="trans-up">+</button>
    </div>
  </div>

  <div class="row">
    <span class="row-label">Text color</span>
    <input type="color" class="color-pick" id="color-pick" value="#ffffff" />
  </div>

  <div class="row">
    <span class="row-label">Position</span>
    <div class="pos-grid">
      <div></div>
      <button class="pos-btn" id="pos-up" title="Move up">&#9650;</button>
      <div></div>
      <button class="pos-btn" id="pos-left" title="Move left">&#9664;</button>
      <div class="center-dot">&#8226;</div>
      <button class="pos-btn" id="pos-right" title="Move right">&#9654;</button>
      <div></div>
      <button class="pos-btn" id="pos-down" title="Move down">&#9660;</button>
      <div></div>
    </div>
  </div>

  <div class="actions">
    <button id="reset-pos">Reset position</button>
  </div>

  <p class="status" id="status">Waiting for lyrics&hellip;</p>

  <script src="popup.js"></script>
</body>
</html>
